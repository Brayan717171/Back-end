<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil API | Dark Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;         /* Preto profundo */
    --surface: #141414;    /* Cinza escuro */
    --surface-hover: #1c1c1c;
    --border: #262626;     /* Cinza médio para bordas */
    --border-bright: #404040;
    --text: #ededed;       /* Branco off */
    --muted: #a1a1aa;      /* Cinza texto */
    --accent: #ef4444;     /* Vermelho Vibrante */
    --accent-glow: rgba(239, 68, 68, 0.15);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    background-image: radial-gradient(circle at top right, #1a1010, transparent 400px);
  }

  .page { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .brand { display: flex; align-items: center; gap: 14px; }

  .brand-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 15px var(--accent-glow);
  }

  .brand-name { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; color: #fff; }
  .brand-sub { font-size: 12px; color: var(--muted); }

  .status-badge {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px;
    background: #000; border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 100px;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.online { background: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
  .dot.offline { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

  /* ROUTES */
  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--accent); margin-bottom: 16px;
  }

  .route-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 8px; margin-bottom: 32px; }

  .route-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .route-item:hover { border-color: var(--border-bright); background: var(--surface-hover); transform: translateX(4px); }
  .route-item.active { border-color: var(--accent); background: #1a1111; }

  .method-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    color: #fff; background: #262626;
    padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
  }

  .route-path { font-family: var(--mono); font-size: 13px; color: #fff; flex: 1; }
  .route-path .param { color: var(--accent); opacity: 0.9; }
  .route-desc-inline { font-size: 12px; color: var(--muted); font-weight: 300; }

  /* PANEL */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    overflow: hidden; margin-top: 24px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .panel-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: #0c0c0c;
  }

  .url-display { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .url-display .host { color: var(--muted); }
  .url-display .ep { color: #fff; font-weight: 500; }

  .panel-inputs {
    padding: 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap;
    background: #111;
  }

  .field label {
    display: block; font-size: 10px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; margin-bottom: 6px;
  }

  .field input {
    background: #000; border: 1px solid var(--border);
    color: #fff; padding: 10px 14px; border-radius: 8px;
    font-family: var(--mono); font-size: 13px; outline: none;
    transition: all 0.2s; width: 160px;
  }

  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

  .btn-primary {
    background: var(--accent); color: white;
    padding: 10px 24px; border-radius: 8px; border: none;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;
  }

  .btn-primary:hover { background: #ff5555; transform: scale(1.02); }
  .btn-primary:active { transform: scale(0.98); }

  .panel-tabs { display: flex; background: #0c0c0c; padding: 0 24px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 12px 20px; font-size: 12px; color: var(--muted);
    cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s;
  }
  .tab:hover { color: #fff; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel-body { padding: 24px; min-height: 200px; background: #0f0f0f; }

  /* JSON HIGHLIGHTING */
  .json-wrap { font-family: var(--mono); font-size: 13px; color: #d4d4d4; }
  .jk { color: #9cdcfe; } /* keys */
  .js { color: #ce9178; } /* strings */
  .jn { color: #b5cea8; } /* numbers */
  .jb { color: #569cd6; } /* booleans */

  /* TABLE */
  .overflow-x { border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
  .resp-table { width: 100%; border-collapse: collapse; background: #141414; }
  .resp-table th { background: #1c1c1c; color: var(--muted); text-align: left; padding: 12px; font-size: 11px; text-transform: uppercase; }
  .resp-table td { padding: 12px; border-bottom: 1px solid var(--border); color: #ddd; }
  .resp-table tr:hover td { background: #1a1a1a; }

  .panel-footer {
    padding: 12px 24px; background: #0c0c0c; border-top: 1px solid var(--border);
    display: flex; gap: 20px; font-family: var(--mono); font-size: 11px;
  }

  .status-ok { color: #22c55e; }
  .status-err { color: var(--accent); }

  .spin {
    width: 16px; height: 16px;
    border: 2px solid #333; border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
</head>
<body>

<div class="page">
  <header class="header">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div>
        <div class="brand-name">BRASIL API</div>
        <div class="brand-sub">Console de Dados Geográficos</div>
      </div>
    </div>
    <div class="status-badge">
      <div class="dot" id="dot"></div>
      <span id="statusTxt" style="color: var(--muted)">pinging...</span>
    </div>
  </header>

  <div class="section-label">Endpoints</div>
  <div class="route-list" id="routeList"></div>

  <div class="panel" id="panel" style="display:none">
    <div class="panel-header">
      <span class="method-badge">GET</span>
      <div class="url-display">
        <span class="host">api.local</span><span id="urlPath" class="ep"></span>
      </div>
    </div>

    <div class="panel-inputs" id="panelInputs"></div>

    <div class="panel-tabs">
      <div class="tab active" id="tabJson" onclick="setTab('json')">RESPOSTA JSON</div>
      <div class="tab" id="tabTable" onclick="setTab('table')">VISUALIZAÇÃO TABELA</div>
    </div>

    <div class="panel-body" id="panelBody"></div>

    <div class="panel-footer" id="panelFooter" style="display:none">
      <span id="ftStatus"></span>
      <span id="ftTime" style="color: var(--muted)"></span>
      <span id="ftSize" style="color: var(--muted)"></span>
    </div>
  </div>
</div>

<script>
// Mantive sua lógica original, apenas ajustei seletores e strings de UI
const BASE = 'http://localhost:3000';
const ROUTES = [
  { id:'r1', path:'/estados', label:'/estados', desc:'Lista siglas', params:[] },
  { id:'r2', path:'/estados/:uf', label:'/estados/<span class="param">:uf</span>', desc:'Dados do estado', params:[{name:'uf',ph:'SP'}] },
  { id:'r3', path:'/estados/:uf/capital', label:'/estados/<span class="param">:uf</span>/capital', desc:'Capital', params:[{name:'uf',ph:'RJ'}] },
  { id:'r4', path:'/estados/:uf/cidades', label:'/estados/<span class="param">:uf</span>/cidades', desc:'Cidades', params:[{name:'uf',ph:'MS'}] },
  { id:'r5', path:'/regioes/:regiao', label:'/regioes/<span class="param">:regiao</span>', desc:'Estados da região', params:[{name:'regiao',ph:'Sul'}] },
  { id:'r6', path:'/capital-pais', label:'/capital-pais', desc:'Histórico nacional', params:[] },
];

let active = null, tab = 'json', lastData = null;
const list = document.getElementById('routeList');

ROUTES.forEach(r => {
  const el = document.createElement('div');
  el.className = 'route-item';
  el.id = 'ri-' + r.id;
  el.innerHTML = `
    <span class="method-badge">GET</span>
    <span class="route-path">${r.label}</span>
    <span class="route-desc-inline">${r.desc}</span>
  `;
  el.onclick = () => openRoute(r);
  list.appendChild(el);
});

function openRoute(r) {
  document.querySelectorAll('.route-item').forEach(e => e.classList.remove('active'));
  document.getElementById('ri-' + r.id).classList.add('active');
  active = r;
  document.getElementById('panel').style.display = 'block';
  document.getElementById('urlPath').innerHTML = r.label;
  
  const inp = document.getElementById('panelInputs');
  inp.innerHTML = '';
  r.params.forEach(p => {
    const f = document.createElement('div');
    f.className = 'field';
    f.innerHTML = `<label>${p.name}</label><input id="p-${p.name}" value="${p.ph}">`;
    inp.appendChild(f);
  });

  const btn = document.createElement('button');
  btn.className = 'btn-primary';
  btn.innerHTML = 'Executar';
  btn.onclick = run;
  inp.appendChild(btn);
}

async function run() {
  if (!active) return;
  let url = BASE + active.path;
  active.params.forEach(p => {
    const v = document.getElementById('p-' + p.name).value.trim() || p.ph;
    url = url.replace(':' + p.name, encodeURIComponent(v));
  });

  const body = document.getElementById('panelBody');
  body.innerHTML = `<div style="display:flex; gap:10px; align-items:center; color:var(--muted)"><div class="spin"></div> Processando requisição...</div>`;
  
  const t0 = Date.now();
  try {
    const res = await fetch(url);
    const ms = Date.now() - t0;
    const txt = await res.text();
    lastData = JSON.parse(txt);
    
    document.getElementById('panelFooter').style.display = 'flex';
    document.getElementById('ftStatus').innerHTML = `<span class="${res.ok ? 'status-ok' : 'status-err'}">${res.status} ${res.statusText}</span>`;
    document.getElementById('ftTime').textContent = ms + 'ms';
    render();
  } catch(e) {
    body.innerHTML = `<div style="color:var(--accent)"><strong>Erro de Conexão:</strong> ${e.message}</div>`;
  }
}

function render() {
  if (!lastData) return;
  const body = document.getElementById('panelBody');
  if (tab === 'json') {
    body.innerHTML = `<pre class="json-wrap">${highlight(JSON.stringify(lastData, null, 2))}</pre>`;
  } else {
    body.innerHTML = `<div class="overflow-x"><table class="resp-table"><thead><tr><th>Chave</th><th>Valor</th></tr></thead><tbody>${Object.entries(lastData).map(([k,v])=>`<tr><td>${k}</td><td>${typeof v === 'object' ? 'Objeto/Array' : v}</td></tr>`).join('')}</tbody></table></div>`;
  }
}

function setTab(t) {
  tab = t;
  document.getElementById('tabJson').classList.toggle('active', t === 'json');
  document.getElementById('tabTable').classList.toggle('active', t === 'table');
  render();
}

function highlight(json) {
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
    let cls = 'jn';
    if (/^"/.test(m)) cls = /:$/.test(m) ? 'jk' : 'js';
    else if (/true|false/.test(m)) cls = 'jb';
    return `<span class="${cls}">${m}</span>`;
  });
}

async function checkApi() {
  const dot = document.getElementById('dot');
  try {
    await fetch(BASE + '/estados', { signal: AbortSignal.timeout(1000) });
    dot.className = 'dot online';
    document.getElementById('statusTxt').textContent = 'SISTEMA ONLINE';
  } catch {
    dot.className = 'dot offline';
    document.getElementById('statusTxt').textContent = 'API OFFLINE';
  }
}
checkApi();
setInterval(checkApi, 5000);
</script>

</body>
</html>
